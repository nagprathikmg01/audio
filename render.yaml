services:
  - type: web
    name: audio-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: WHISPER_MODEL_SIZE
        value: "tiny"
